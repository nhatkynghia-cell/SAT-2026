name: CI

# CI (implementation_plan.md §9.8, task #5.4): 3 cổng CHẶN cho tầng logic nền —
# tsc (kiểu) + test (unit) + lint. Chạy trên mỗi push/PR đụng sat-prep-web.
#
# ⚠️ npm ci PHẢI kèm --legacy-peer-deps: lucide-react@0.344.0 khai báo peer
#    react ^16/17/18 nhưng dự án dùng React 19 → npm ci thường sẽ ERESOLVE fail.
# ⚠️ Node 24: test chạy `node --test "src/**/*.test.ts"` cần >= 23.6 (native
#    TypeScript type-stripping không cờ). Node 22 sẽ không parse được .ts.
# Chưa chạy `next build` trong CI (giữ nhanh); tsc + lint đã phủ kiểu + style.

on:
  push:
    branches: [main]
    paths:
      - 'sat-prep-web/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'sat-prep-web/**'
      - '.github/workflows/ci.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sat-prep-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: sat-prep-web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck (tsc)
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Lint
        run: npm run lint
